apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass

metadata:
  name: default

spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  instanceProfile: karpenter-node-instance-profile

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-project

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-project