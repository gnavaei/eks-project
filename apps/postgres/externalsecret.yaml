apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: postgres-secret
  namespace: postgres

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: postgres-secret

  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: postgres-creds
        property: username

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: postgres-creds
        property: password

    - secretKey: POSTGRES_DB
      remoteRef:
        key: postgres-creds
        property: database